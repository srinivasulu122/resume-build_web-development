<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>Resume Builder</h1>
            
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Your full name">
            </div>
            
            <div class="form-group">
                <label for="title">Professional Title</label>
                <input type="text" id="title" placeholder="e.g. Software Engineer">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your.email@example.com">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" placeholder="Your phone number">
            </div>
            
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" placeholder="Your address">
            </div>
            
            <div class="form-group">
                <label for="linkedin">LinkedIn Profile (Optional)</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
            </div>
            
            <div class="form-group">
                <label for="github">GitHub Profile (Optional)</label>
                <input type="url" id="github" placeholder="https://github.com/yourusername">
            </div>
            
            <div class="form-group">
                <label for="summary">Professional Summary</label>
                <textarea id="summary" placeholder="Brief summary of your professional background and goals"></textarea>
            </div>
            
            <h2>Experience</h2>
            <div id="experience-container">
                <!-- Experience items will be added here -->
            </div>
            <button type="button" id="add-experience">+ Add Experience</button>
            
            <h2>Education</h2>
            <div id="education-container">
                <!-- Education items will be added here -->
            </div>
            <button type="button" id="add-education">+ Add Education</button>
            
            <div class="form-group">
                <label for="skills">Skills (comma separated)</label>
                <input type="text" id="skills" placeholder="JavaScript, Python, Project Management, etc.">
            </div>
            
            <div class="button-group">
                <button id="generate-resume">Generate Preview</button>
                <button id="clear-form" class="btn-secondary">Clear Form</button>
                <button id="print-btn" class="btn-print">Print/Save as PDF</button>
            </div>
        </div>
        
        <div class="resume-container">
            <div class="resume" id="resume">
                <div class="resume-header">
                    <h1 class="resume-title" id="resume-title">Your Name</h1>
                    <div class="resume-subtitle" id="resume-subtitle">Professional Title</div>
                    <div class="resume-contact" id="resume-contact-info">
                        <span id="resume-email">email@example.com</span> | 
                        <span id="resume-phone">Phone Number</span> | 
                        <span id="resume-address">Address</span>
                    </div>
                    <div class="resume-links" id="resume-links"></div>
                </div>
                
                <div class="resume-section" id="resume-summary-section">
                    <h2 class="resume-section-title">Professional Summary</h2>
                    <p id="resume-summary">Your professional summary will appear here.</p>
                </div>
                
                <div class="resume-section" id="resume-experience-section">
                    <h2 class="resume-section-title">Experience</h2>
                    <div id="resume-experience"></div>
                </div>
                
                <div class="resume-section" id="resume-education-section">
                    <h2 class="resume-section-title">Education</h2>
                    <div id="resume-education"></div>
                </div>
                
                <div class="resume-section" id="resume-skills-section">
                    <h2 class="resume-section-title">Skills</h2>
                    <div class="skills-list" id="resume-skills"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Print container -->
    <div id="print-resume" class="print-resume"></div>

    <script src="script.js"></script>
</body>
</html>
